<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

   
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/colors.css" />
    <link rel="stylesheet" href="css/typography.css" />
    <link rel="stylesheet" href="css/spacing.css" />
    <link rel="stylesheet" href="css/sizing.css">
    <link rel="stylesheet" href="css/borders.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/responsive.css" />

    <!-- Page Title -->
    <title>MediConnect - Bridging Healthcare & Technology</title>
</head>

<body class="bg-main">
    <!-- Add your Header Section here  -->
    <header
        class="pl-16 py-5 fixed z-50">
        <div class="container flex items-center justify-between mx-auto px-4">
            <a href="/">
                <span class="text-medical-700 text-2xl font-semibold">
                    Medi<span class="text-medical-500 ">Connect</span>
                </span>
            </a>

            <!-- Desktop Navigation -->
            <nav>
                <a href="/"
                    class="text-sm font-medium hover:text-medical-600 text-medical-700">Home</a>
                <a href="/doctors"
                    class="text-sm font-medium hover:text-medical-600 text-gray-600">Doctors</a>
                <a href="/hospitals"
                    class="text-sm font-medium hover:text-medical-600 text-gray-600">Hospitals</a>
                <a href="/appointments"
                    class="text-sm font-medium hover:text-medical-600 text-gray-600">Appointments</a>
                <a href="/dashboard"
                    class="text-sm font-medium hover:text-medical-600 text-gray-600">Dashboard</a>
            </nav>

            <div class="auth-buttons flex items-center gap-4">
                <a href="/login"
                    class="inline-flex items-center justify-center text-sm rounded-xl font-medium border border-solid border-main bg-main text-main px-3 py-2 h-9">Sign
                    In</a>
                <a href="/signup"
                    class="inline-flex items-center justify-center text-sm rounded-xl font-medium bg-medical-500 text-white mr-20 px-3 py-2 h-9">Sign
                    Up</a>

                <!-- Mobile Menu Button -->
                <button
                    class="mobile-menu rounded-md p-2 text-gray-700 hover:text-medical-600 hover:bg-gray-100">
                    <i data-lucide="menu"></i>
                </button>
            </div>
        </div>

        <!-- Mobile Navigation (Hidden by default) -->
        <div class="mobile-nav bg-medical-50 none absolute shadow-lg">
            <nav class="container my-0 mx-auto p-4 py-4 flex flex-col gap-4 space-y-4 > * + * ">
                <a href="/"
                    class="text-sm py-2 px-3 rounded-md font-medium bg-medical-50 text-medical-700">Home</a>
                <a href="/doctors"
                    class="text-sm py-2 px-3 rounded-md font-medium text-gray-600 hover:bg-gray-50">Doctors</a>
                <a href="/hospitals"
                    class="text-sm py-2 px-3 rounded-md font-medium text-gray-600 hover:bg-gray-50">Hospitals</a>
                <a href="/appointments"
                    class="text-sm py-2 px-3 rounded-md font-medium text-gray-600 hover:bg-gray-50">Appointments</a>
                <a href="/dashboard"
                    class="text-sm py-2 px-3 rounded-md font-medium text-gray-600 hover:bg-gray-50">Dashboard</a>

                <div class="flex flex-col space-y-2 pt-2 border-t">
                    <a href="/login"
                        class="inline-flex items-center justify-center border border-solid borer-main rounded-md text-sm font-medium bg-background hover:bg-accent hover:text-accent-foreground h-9 px-4 py-2">Sign
                        In</a>
                    <a href="/signup"
                        class="inline-flex items-center justify-center rounded-md text-sm font-medium bg-primary text-primary-foreground hover:bg-primary/90 h-9 px-4 py-2">Sign
                        Up</a>
                </div>
            </nav>
        </div>
    </header>
    <script>
        lucide.createIcons();
    </script>
</body>

</html>
